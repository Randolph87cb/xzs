services:
  app:
    image: ${XZS_IMAGE:-crpi-s5bag0a5r8vcgncq.cn-hangzhou.personal.cr.aliyuncs.com/randolph87/xzs:latest}
    container_name: xzs-app
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8000
      XZS_LOG_PATH: /usr/log/xzs/
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx512m -XX:+UseSerialGC}
      SERVER_UNDERTOW_IO_THREADS: ${SERVER_UNDERTOW_IO_THREADS:-2}
      SERVER_UNDERTOW_WORKER_THREADS: ${SERVER_UNDERTOW_WORKER_THREADS:-16}
      SERVER_UNDERTOW_BUFFER_SIZE: ${SERVER_UNDERTOW_BUFFER_SIZE:-512}
      SERVER_UNDERTOW_DIRECT_BUFFERS: ${SERVER_UNDERTOW_DIRECT_BUFFERS:-false}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?set Neon production SPRING_DATASOURCE_URL in docker/.env}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-4}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-1}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      XZS_AI_CONFIG_SECRET: ${XZS_AI_CONFIG_SECRET:?set production XZS_AI_CONFIG_SECRET in docker/.env}
    ports:
      - "${XZS_HOST_PORT:-8000}:8000"
    volumes:
      - ./log:/usr/log/xzs/
